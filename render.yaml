services:
  - type: web
    name: campus-complaint-system
    runtime: node
    plan: free
    buildCommand: cd backend && npm ci && cd ../frontend && npm ci && npm run build
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: CLIENT_URL
        sync: false
